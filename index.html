<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 시분초 계산기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f5f7fa; color: #333; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: #444; border-left: 4px solid #007bff; padding-left: 10px; }
        section { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        
        .input-item { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        
        /* 입력 불가능한 란 (결과창) 스타일 */
        input[readonly] { background-color: #f9f9f9; border-color: #eee; color: #007bff; font-weight: bold; cursor: default; }
        .adjusted-box { background-color: #eef6ff !important; border: 1px solid #bcd9ff !important; }

        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; background-color: #f0f0f0; transition: 0.2s; }
        button:hover { background-color: #e0e0e0; }
        button.plus { background-color: #007bff; color: white; }
        button.plus:hover { background-color: #0056b3; }
        
        .hms-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .reset-btn { width: 100%; background: #333; color: white; margin-top: 10px; padding: 12px; }
    </style>
</head>
<body>

<div class="container">
    <section>
        <h2>1. 직접 입력 및 변환</h2>
        <div class="input-item">
            <label>사용자 입력 (초)</label>
            <input type="number" id="manualInput" placeholder="숫자만 입력하세요" oninput="updateManual()">
        </div>
        <div class="input-item">
            <label>입력값 변환 결과 (시:분:초)</label>
            <input type="text" id="manualHms" readonly value="00:00:00">
        </div>
    </section>

    <section style="border: 1px solid #bcd9ff; background-color: #fdfeff;">
        <h2>2. 증감 조작 결과 (입력불가)</h2>
        <div class="input-item">
            <label>조작된 총 합계 (초)</label>
            <input type="text" id="adjSec" class="adjusted-box" readonly value="0">
        </div>
        <div class="input-item">
            <label>조작된 최종 시간 (시:분:초)</label>
            <input type="text" id="adjHms" class="adjusted-box" readonly value="00:00:00">
        </div>

        <div class="btn-grid">
            <button class="plus" onclick="adjust(3600)">+1시간</button>
            <button class="plus" onclick="adjust(36000)">+10시간</button>
            <button class="plus" onclick="adjust(60)">+1분</button>
            <button onclick="adjust(-3600)">-1시간</button>
            <button onclick="adjust(-36000)">-10시간</button>
            <button onclick="adjust(-60)">-1분</button>
        </div>
        <button class="reset-btn" onclick="resetAll()">모든 데이터 초기화</button>
    </section>

    <section>
        <h2>3. 시:분:초를 초로 반환</h2>
        <div class="hms-row">
            <div><label>시</label><input type="number" id="revH" value="0" oninput="reverseCalc()"></div>
            <div><label>분</label><input type="number" id="revM" value="0" oninput="reverseCalc()"></div>
            <div><label>초</label><input type="number" id="revS" value="0" oninput="reverseCalc()"></div>
        </div>
        <div class="input-item" style="margin-top:15px;">
            <label>합산된 초 (Seconds)</label>
            <input type="text" id="revResult" readonly value="0 초">
        </div>
    </section>
</div>

<script>
    let adjustment = 0; // 버튼으로 조작된 누적 증감값

    // 초를 시:분:초 문자열로 만드는 함수
    function toHMS(seconds) {
        const s = Math.max(0, seconds);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    // 1. 직접 입력란 업데이트
    function updateManual() {
        const val = parseInt(document.getElementById('manualInput').value) || 0;
        document.getElementById('manualHms').value = toHMS(val);
        updateAdjustedDisplay(); // 입력값이 바뀌면 조작 결과 영역도 함께 갱신
    }

    // 2. 증감 버튼 로직
    function adjust(amount) {
        adjustment += amount;
        updateAdjustedDisplay();
    }

    // 조작 결과 영역(섹션 2) 갱신
    function updateAdjustedDisplay() {
        const base = parseInt(document.getElementById('manualInput').value) || 0;
        const total = Math.max(0, base + adjustment);
        
        document.getElementById('adjSec').value = total.toLocaleString();
        document.getElementById('adjHms').value = toHMS(total);
    }

    // 3. 시분초 -> 초 역산 로직
    function reverseCalc() {
        const h = parseInt(document.getElementById('revH').value) || 0;
        const m = parseInt(document.getElementById('revM').value) || 0;
        const s = parseInt(document.getElementById('revS').value) || 0;
        const total = (h * 3600) + (m * 60) + s;
        document.getElementById('revResult').value = total.toLocaleString() + " 초";
    }

    function resetAll() {
        adjustment = 0;
        document.getElementById('manualInput').value = '';
        document.getElementById('manualHms').value = '00:00:00';
        document.getElementById('revH').value = 0;
        document.getElementById('revM').value = 0;
        document.getElementById('revS').value = 0;
        updateAdjustedDisplay();
        reverseCalc();
    }
</script>

</body>
</html>
